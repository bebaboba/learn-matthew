<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f6f2"/>

  <!-- 7 × 5 grid of identical diamond marks — same form, same size, consistency at scale -->
  <!-- Diamonds: rotate(45) squares 10×10, centered at each grid position -->
  <!-- Cols at x: 95, 210, 325, 400, 475, 590, 705 -->
  <!-- Rows at y: 80, 170, 250, 330, 420 -->
  <!-- Opacity fades left-to-right, top-to-bottom — suggesting depth/time -->

  <!-- Row 1 — opacity 0.65 -->
  <rect x="86"  y="71"  width="18" height="18" transform="rotate(45 95 80)"  fill="#1a1a18" opacity="0.65"/>
  <rect x="201" y="161" width="18" height="18" transform="rotate(45 210 170)" fill="#1a1a18" opacity="0.55"/>
  <rect x="316" y="71"  width="18" height="18" transform="rotate(45 325 80)"  fill="#1a1a18" opacity="0.52"/>
  <rect x="391" y="71"  width="18" height="18" transform="rotate(45 400 80)"  fill="#1a1a18" opacity="0.48"/>
  <rect x="466" y="71"  width="18" height="18" transform="rotate(45 475 80)"  fill="#1a1a18" opacity="0.44"/>
  <rect x="581" y="71"  width="18" height="18" transform="rotate(45 590 80)"  fill="#1a1a18" opacity="0.38"/>
  <rect x="696" y="71"  width="18" height="18" transform="rotate(45 705 80)"  fill="#1a1a18" opacity="0.30"/>

  <!-- Row 2 — opacity 0.55 -->
  <rect x="86"  y="161" width="18" height="18" transform="rotate(45 95 170)"  fill="#1a1a18" opacity="0.55"/>
  <rect x="201" y="161" width="18" height="18" transform="rotate(45 210 170)" fill="#1a1a18" opacity="0.48"/>
  <rect x="316" y="161" width="18" height="18" transform="rotate(45 325 170)" fill="#1a1a18" opacity="0.44"/>
  <rect x="391" y="161" width="18" height="18" transform="rotate(45 400 170)" fill="#1a1a18" opacity="0.40"/>
  <rect x="466" y="161" width="18" height="18" transform="rotate(45 475 170)" fill="#1a1a18" opacity="0.36"/>
  <rect x="581" y="161" width="18" height="18" transform="rotate(45 590 170)" fill="#1a1a18" opacity="0.30"/>
  <rect x="696" y="161" width="18" height="18" transform="rotate(45 705 170)" fill="#1a1a18" opacity="0.24"/>

  <!-- Row 3 — opacity 0.40 -->
  <rect x="86"  y="241" width="18" height="18" transform="rotate(45 95 250)"  fill="#1a1a18" opacity="0.40"/>
  <rect x="201" y="241" width="18" height="18" transform="rotate(45 210 250)" fill="#1a1a18" opacity="0.36"/>
  <rect x="316" y="241" width="18" height="18" transform="rotate(45 325 250)" fill="#C8956C" opacity="0.70"/>
  <rect x="391" y="241" width="18" height="18" transform="rotate(45 400 250)" fill="#1a1a18" opacity="0.30"/>
  <rect x="466" y="241" width="18" height="18" transform="rotate(45 475 250)" fill="#1a1a18" opacity="0.26"/>
  <rect x="581" y="241" width="18" height="18" transform="rotate(45 590 250)" fill="#1a1a18" opacity="0.22"/>
  <rect x="696" y="241" width="18" height="18" transform="rotate(45 705 250)" fill="#1a1a18" opacity="0.18"/>

  <!-- Row 4 — opacity 0.28 -->
  <rect x="86"  y="321" width="18" height="18" transform="rotate(45 95 330)"  fill="#1a1a18" opacity="0.28"/>
  <rect x="201" y="321" width="18" height="18" transform="rotate(45 210 330)" fill="#1a1a18" opacity="0.24"/>
  <rect x="316" y="321" width="18" height="18" transform="rotate(45 325 330)" fill="#1a1a18" opacity="0.22"/>
  <rect x="391" y="321" width="18" height="18" transform="rotate(45 400 330)" fill="#1a1a18" opacity="0.20"/>
  <rect x="466" y="321" width="18" height="18" transform="rotate(45 475 330)" fill="#1a1a18" opacity="0.18"/>
  <rect x="581" y="321" width="18" height="18" transform="rotate(45 590 330)" fill="#1a1a18" opacity="0.15"/>
  <rect x="696" y="321" width="18" height="18" transform="rotate(45 705 330)" fill="#1a1a18" opacity="0.12"/>

  <!-- Row 5 — opacity 0.16 -->
  <rect x="86"  y="411" width="18" height="18" transform="rotate(45 95 420)"  fill="#1a1a18" opacity="0.16"/>
  <rect x="201" y="411" width="18" height="18" transform="rotate(45 210 420)" fill="#1a1a18" opacity="0.14"/>
  <rect x="316" y="411" width="18" height="18" transform="rotate(45 325 420)" fill="#1a1a18" opacity="0.12"/>
  <rect x="391" y="411" width="18" height="18" transform="rotate(45 400 420)" fill="#1a1a18" opacity="0.10"/>
  <rect x="466" y="411" width="18" height="18" transform="rotate(45 475 420)" fill="#1a1a18" opacity="0.09"/>
  <rect x="581" y="411" width="18" height="18" transform="rotate(45 590 420)" fill="#1a1a18" opacity="0.08"/>
  <rect x="696" y="411" width="18" height="18" transform="rotate(45 705 420)" fill="#1a1a18" opacity="0.07"/>
</svg>
