<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#5b90a0"/>

  <g filter="url(#hd)">

  <!-- 7 × 5 grid of identical diamond marks — same form, same size, consistency at scale -->
  <!-- Diamonds: rotate(45) squares 18×18, centered at each grid position -->
  <!-- Cols at x: 95, 197, 298, 400, 502, 603, 705 (even spacing) -->
  <!-- Rows at y: 80, 170, 250, 330, 420 -->
  <!-- Opacity fades left-to-right, top-to-bottom — suggesting depth/time -->

  <!-- Row 1 — opacity 0.65 -->
  <rect x="86"  y="71"  width="18" height="18" transform="rotate(45 95 80)"  fill="#1a1a18" opacity="0.65"/>
  <rect x="188" y="71"  width="18" height="18" transform="rotate(45 197 80)" fill="#1a1a18" opacity="0.58"/>
  <rect x="289" y="71"  width="18" height="18" transform="rotate(45 298 80)" fill="#1a1a18" opacity="0.52"/>
  <rect x="391" y="71"  width="18" height="18" transform="rotate(45 400 80)" fill="#1a1a18" opacity="0.48"/>
  <rect x="493" y="71"  width="18" height="18" transform="rotate(45 502 80)" fill="#1a1a18" opacity="0.44"/>
  <rect x="594" y="71"  width="18" height="18" transform="rotate(45 603 80)" fill="#1a1a18" opacity="0.38"/>
  <rect x="696" y="71"  width="18" height="18" transform="rotate(45 705 80)" fill="#1a1a18" opacity="0.30"/>

  <!-- Row 2 — opacity 0.55 -->
  <rect x="86"  y="161" width="18" height="18" transform="rotate(45 95 170)"  fill="#1a1a18" opacity="0.55"/>
  <rect x="188" y="161" width="18" height="18" transform="rotate(45 197 170)" fill="#1a1a18" opacity="0.48"/>
  <rect x="289" y="161" width="18" height="18" transform="rotate(45 298 170)" fill="#1a1a18" opacity="0.44"/>
  <rect x="391" y="161" width="18" height="18" transform="rotate(45 400 170)" fill="#1a1a18" opacity="0.40"/>
  <rect x="493" y="161" width="18" height="18" transform="rotate(45 502 170)" fill="#1a1a18" opacity="0.36"/>
  <rect x="594" y="161" width="18" height="18" transform="rotate(45 603 170)" fill="#1a1a18" opacity="0.30"/>
  <rect x="696" y="161" width="18" height="18" transform="rotate(45 705 170)" fill="#1a1a18" opacity="0.24"/>

  <!-- Row 3 — opacity 0.40, copper highlight -->
  <rect x="86"  y="241" width="18" height="18" transform="rotate(45 95 250)"  fill="#1a1a18" opacity="0.40"/>
  <rect x="188" y="241" width="18" height="18" transform="rotate(45 197 250)" fill="#1a1a18" opacity="0.36"/>
  <rect x="289" y="241" width="18" height="18" transform="rotate(45 298 250)" fill="#C8956C" opacity="0.95"/>
  <rect x="391" y="241" width="18" height="18" transform="rotate(45 400 250)" fill="#1a1a18" opacity="0.30"/>
  <rect x="493" y="241" width="18" height="18" transform="rotate(45 502 250)" fill="#1a1a18" opacity="0.26"/>
  <rect x="594" y="241" width="18" height="18" transform="rotate(45 603 250)" fill="#1a1a18" opacity="0.22"/>
  <rect x="696" y="241" width="18" height="18" transform="rotate(45 705 250)" fill="#1a1a18" opacity="0.18"/>

  <!-- Row 4 — opacity 0.30 -->
  <rect x="86"  y="321" width="18" height="18" transform="rotate(45 95 330)"  fill="#1a1a18" opacity="0.30"/>
  <rect x="188" y="321" width="18" height="18" transform="rotate(45 197 330)" fill="#1a1a18" opacity="0.27"/>
  <rect x="289" y="321" width="18" height="18" transform="rotate(45 298 330)" fill="#1a1a18" opacity="0.24"/>
  <rect x="391" y="321" width="18" height="18" transform="rotate(45 400 330)" fill="#1a1a18" opacity="0.22"/>
  <rect x="493" y="321" width="18" height="18" transform="rotate(45 502 330)" fill="#1a1a18" opacity="0.20"/>
  <rect x="594" y="321" width="18" height="18" transform="rotate(45 603 330)" fill="#1a1a18" opacity="0.18"/>
  <rect x="696" y="321" width="18" height="18" transform="rotate(45 705 330)" fill="#1a1a18" opacity="0.16"/>

  <!-- Row 5 — opacity 0.20 -->
  <rect x="86"  y="411" width="18" height="18" transform="rotate(45 95 420)"  fill="#1a1a18" opacity="0.20"/>
  <rect x="188" y="411" width="18" height="18" transform="rotate(45 197 420)" fill="#1a1a18" opacity="0.18"/>
  <rect x="289" y="411" width="18" height="18" transform="rotate(45 298 420)" fill="#1a1a18" opacity="0.16"/>
  <rect x="391" y="411" width="18" height="18" transform="rotate(45 400 420)" fill="#1a1a18" opacity="0.15"/>
  <rect x="493" y="411" width="18" height="18" transform="rotate(45 502 420)" fill="#1a1a18" opacity="0.14"/>
  <rect x="594" y="411" width="18" height="18" transform="rotate(45 603 420)" fill="#1a1a18" opacity="0.13"/>
  <rect x="696" y="411" width="18" height="18" transform="rotate(45 705 420)" fill="#1a1a18" opacity="0.12"/>
  </g>
</svg>
