<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#4f8a83"/>

  <!-- Connector lines — crisp and unfiltered; endpoints overshoot ~5px into each node's
       footprint (scale=9 here, so a smaller overshoot than the scale=13 files) so they
       still read as connected once the filtered node drifts under displacement -->
  <g>
  <!-- Governance framework — horizontal standard line through middle row (drawn first so team dots sit on top of it) -->
  <line x1="55" y1="250" x2="745" y2="250" stroke="#1a1a18" stroke-width="4" stroke-dasharray="4 6"/>

  <!-- Thin connecting lines — active teams connected across the framework -->
  <line x1="193.2" y1="76.8"  x2="403.8" y2="253.2" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  <line x1="504.6" y1="75.7"  x2="397.4" y2="254.3" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  <line x1="90.2"  y1="168.7" x2="404.8" y2="251.3" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  <line x1="709.8" y1="168.7" x2="395.2" y2="251.3" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  <line x1="294.1" y1="333.1" x2="403.9" y2="246.9" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  <line x1="607.7" y1="331.8" x2="395.4" y2="248.2" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  <line x1="193.2" y1="423.2" x2="403.8" y2="246.8" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  <line x1="606.8" y1="423.2" x2="396.2" y2="246.8" stroke="#C8956C" stroke-width="3.6" opacity="0.65"/>
  </g>

  <g filter="url(#hd)">

  <!-- 7 × 5 grid of team nodes — 35 total, evenly distributed -->
  <!-- Cols at x: 95, 197, 298, 400, 502, 603, 705 (even ~101.7 spacing) -->
  <!-- Rows at y: 80, 170, 250, 330, 420 -->

  <!-- All base dots (small, light) -->
  <circle cx="95"  cy="80"  r="5" fill="#e5e2db"/>
  <circle cx="197" cy="80"  r="5" fill="#e5e2db"/>
  <circle cx="298" cy="80"  r="5" fill="#e5e2db"/>
  <circle cx="400" cy="80"  r="5" fill="#e5e2db"/>
  <circle cx="502" cy="80"  r="5" fill="#e5e2db"/>
  <circle cx="603" cy="80"  r="5" fill="#e5e2db"/>
  <circle cx="705" cy="80"  r="5" fill="#e5e2db"/>

  <circle cx="95"  cy="170" r="5" fill="#e5e2db"/>
  <circle cx="197" cy="170" r="5" fill="#e5e2db"/>
  <circle cx="298" cy="170" r="5" fill="#e5e2db"/>
  <circle cx="400" cy="170" r="5" fill="#e5e2db"/>
  <circle cx="502" cy="170" r="5" fill="#e5e2db"/>
  <circle cx="603" cy="170" r="5" fill="#e5e2db"/>
  <circle cx="705" cy="170" r="5" fill="#e5e2db"/>

  <circle cx="95"  cy="250" r="5" fill="#e5e2db"/>
  <circle cx="197" cy="250" r="5" fill="#e5e2db"/>
  <circle cx="298" cy="250" r="5" fill="#e5e2db"/>
  <circle cx="400" cy="250" r="5" fill="#e5e2db"/>
  <circle cx="502" cy="250" r="5" fill="#e5e2db"/>
  <circle cx="603" cy="250" r="5" fill="#e5e2db"/>
  <circle cx="705" cy="250" r="5" fill="#e5e2db"/>

  <circle cx="95"  cy="330" r="5" fill="#e5e2db"/>
  <circle cx="197" cy="330" r="5" fill="#e5e2db"/>
  <circle cx="298" cy="330" r="5" fill="#e5e2db"/>
  <circle cx="400" cy="330" r="5" fill="#e5e2db"/>
  <circle cx="502" cy="330" r="5" fill="#e5e2db"/>
  <circle cx="603" cy="330" r="5" fill="#e5e2db"/>
  <circle cx="705" cy="330" r="5" fill="#e5e2db"/>

  <circle cx="95"  cy="420" r="5" fill="#e5e2db"/>
  <circle cx="197" cy="420" r="5" fill="#e5e2db"/>
  <circle cx="298" cy="420" r="5" fill="#e5e2db"/>
  <circle cx="400" cy="420" r="5" fill="#e5e2db"/>
  <circle cx="502" cy="420" r="5" fill="#e5e2db"/>
  <circle cx="603" cy="420" r="5" fill="#e5e2db"/>
  <circle cx="705" cy="420" r="5" fill="#e5e2db"/>

  <!-- Highlighted active team dots — copper, slightly larger -->
  <circle cx="197" cy="80"  r="8.26" fill="#C8956C"/>
  <circle cx="502" cy="80"  r="8.26" fill="#C8956C"/>
  <circle cx="95"  cy="170" r="8.26" fill="#C8956C"/>
  <circle cx="705" cy="170" r="8.26" fill="#C8956C"/>
  <circle cx="298" cy="330" r="8.26" fill="#C8956C"/>
  <circle cx="603" cy="330" r="8.26" fill="#C8956C"/>
  <circle cx="197" cy="420" r="8.26" fill="#C8956C"/>
  <circle cx="603" cy="420" r="8.26" fill="#C8956C"/>

  <!-- Central governance hub -->
  <circle cx="400" cy="250" r="12.98" fill="#1a1a18" stroke="#e5e2db" stroke-width="2.7"/>
  </g>
</svg>
