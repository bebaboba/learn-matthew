<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#8cb89f"/>

  <!-- Connector lines — crisp and unfiltered; endpoints overshoot ~7px into each node's
       footprint so they still read as connected once the filtered node drifts under displacement -->
  <g>
  <line x1="95.5" y1="190.7" x2="177.5" y2="254.3" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="94" y1="250" x2="179" y2="250" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="95.5" y1="309.3" x2="177.5" y2="245.7" stroke="#1a1a18" stroke-width="5.6"/>

  <line x1="183" y1="250" x2="337" y2="250" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="343" y1="250" x2="486" y2="250" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="514" y1="250" x2="657" y2="250" stroke="#1a1a18" stroke-width="5.6"/>

  <!-- feedback loop: adaptation changes the next behavior -->
  <path d="M660 254 C 660 425, 180 425, 180 253" fill="none" stroke="#C8956C" stroke-width="4.8" stroke-dasharray="4 6" opacity="0.85"/>
  <path d="M180 253 L173 265 L187 265 Z" fill="#C8956C" opacity="0.85"/>
  </g>

  <g filter="url(#hd)">

  <!-- behavior: small interaction inputs feeding the first node -->
  <circle cx="95" cy="195" r="5.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.7"/>
  <circle cx="95" cy="250" r="5.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.7"/>
  <circle cx="95" cy="305" r="5.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.7"/>

  <!-- stage 1: behavior -->
  <circle cx="180" cy="250" r="10" fill="#6b6b68"/>

  <!-- stage 2: xAPI -->
  <circle cx="340" cy="250" r="11.8" fill="#1a1a18"/>

  <!-- stage 3: inference — the centerpiece (copper), with a confidence ring + driver dots -->
  <circle cx="500" cy="250" r="21" fill="none" stroke="#C8956C" stroke-width="2.7" opacity="0.65"/>
  <circle cx="500" cy="250" r="15.34" fill="#C8956C"/>
  <circle cx="476" cy="206" r="4.5" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="452" cy="250" r="4.5" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="476" cy="294" r="4.5" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>

  <!-- stage 4: adaptation -->
  <circle cx="660" cy="250" r="11.8" fill="#1a1a18"/>
  </g>
</svg>
