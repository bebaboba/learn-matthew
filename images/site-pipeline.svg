<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#5b90a0"/>

  <!-- Hand-drawn three-stage pipeline: content.md -> build.js -> index.html -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Connecting line, stage 1 -> 2: wavy, doubled stroke for a sketched feel -->
    <path d="M242,247 C263,242 282,253 302,246"
          stroke="#1a1a18" stroke-width="4.5" stroke-dasharray="2 10"/>
    <path d="M242,251 C264,247 281,257 302,250"
          stroke="#1a1a18" stroke-width="4.5" stroke-dasharray="2 10" opacity="0.5"/>
    <path d="M300,236 L316,247 L298,257" stroke="#C8956C" stroke-width="5.5"/>
    <path d="M302,238 L317,248 L300,255" stroke="#C8956C" stroke-width="4.5" opacity="0.4"/>

    <!-- Connecting line, stage 2 -> 3: wavy, doubled stroke -->
    <path d="M486,244 C508,251 528,240 548,247"
          stroke="#1a1a18" stroke-width="4.5" stroke-dasharray="2 10"/>
    <path d="M486,248 C509,255 527,244 548,251"
          stroke="#1a1a18" stroke-width="4.5" stroke-dasharray="2 10" opacity="0.5"/>
    <path d="M546,236 L562,247 L544,257" stroke="#C8956C" stroke-width="5.5"/>
    <path d="M548,238 L563,248 L546,255" stroke="#C8956C" stroke-width="4.5" opacity="0.4"/>

    <!-- Stage 1: content.md — hand-drawn rounded box, doubled outline -->
    <path d="M94,207 C130,203 190,204 226,209 C236,210 238,216 238,224
             C239,253 240,275 237,293 C236,300 229,302 223,302
             C185,305 130,304 96,301 C88,300 86,294 86,287
             C85,258 84,232 87,215 C88,209 88,208 94,207 Z"
          fill="#f8f6f2" stroke="#1a1a18" stroke-width="3.5"/>
    <path d="M97,204 C133,201 192,202 228,207" stroke="#1a1a18" stroke-width="3.5" opacity="0.45"/>
    <text x="163" y="248" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="21" fill="#1a1a18" transform="rotate(-1 163 248)">content.md</text>
    <text x="163" y="274" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b68" transform="rotate(-1 163 274)">copy</text>

    <!-- Stage 2: build.js — highlighted, bolder, filled -->
    <path d="M330,193 C372,187 428,190 468,196 C480,198 482,206 482,216
             C484,248 485,272 481,298 C480,306 472,309 464,309
             C424,313 372,311 334,307 C324,306 321,299 321,290
             C320,258 319,228 323,202 C324,196 322,195 330,193 Z"
          fill="#1a1a18" stroke="#1a1a18" stroke-width="3.5"/>
    <path d="M333,189 C374,183 430,186 470,192" stroke="#1a1a18" stroke-width="3.5" opacity="0.45"/>
    <text x="401" y="245" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="21" fill="#ffffff" transform="rotate(1 401 245)">build.js</text>
    <text x="401" y="272" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#C8956C" transform="rotate(1 401 272)">fails loud on</text>
    <text x="401" y="291" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#C8956C" transform="rotate(1 401 291)">unfilled tokens</text>

    <!-- Stage 3: index.html -->
    <path d="M576,208 C612,203 668,205 704,211 C714,212 716,218 716,226
             C717,253 718,274 715,291 C714,298 707,301 701,301
             C665,305 612,303 578,299 C570,298 568,292 568,285
             C567,258 566,234 569,217 C570,211 570,210 576,208 Z"
          fill="#f8f6f2" stroke="#1a1a18" stroke-width="3.5"/>
    <path d="M579,205 C614,201 670,203 706,209" stroke="#1a1a18" stroke-width="3.5" opacity="0.45"/>
    <text x="641" y="248" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="21" fill="#1a1a18" transform="rotate(-0.5 641 248)">index.html</text>
    <text x="641" y="274" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b6b68" transform="rotate(-0.5 641 274)">generated</text>

    <!-- Hand-drawn "x" marker, sketched circle -->
    <path d="M706,213 C714,210 723,212 726,219 C729,227 726,234 719,236
             C711,238 704,235 702,228 C700,221 699,216 706,213 Z"
          fill="#C8956C" stroke="#C8956C" stroke-width="2"/>
    <path d="M715,220 L723,229 M723,220 L715,229" stroke="#ffffff" stroke-width="2.5"/>
  </g>
</svg>
