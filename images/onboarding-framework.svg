<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="8" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#8cb89f"/>

  <!-- Connector path + tick marks — crisp and unfiltered. The journey curve is anchored at
       each node's exact nominal center (not just its edge), so it stays covered by that
       node's fill even after the node drifts a few px under the filter. Tick marks stand a
       clear 8px off each node already, so they don't need an overshoot adjustment. -->
  <g>
  <!-- Upward-curving journey path — entry to productivity -->
  <path d="M 80,370 Q 400,60 720,120" fill="none" stroke="#1a1a18" stroke-width="7.2"/>

  <!-- Small tick marks below each stage suggesting phase boundaries -->
  <line x1="80"  y1="387" x2="80"  y2="400" stroke="#1a1a18" stroke-width="4.2"/>
  <line x1="240" y1="258" x2="240" y2="271" stroke="#1a1a18" stroke-width="4.2"/>
  <line x1="400" y1="177" x2="400" y2="190" stroke="#1a1a18" stroke-width="4.2"/>
  <line x1="560" y1="141" x2="560" y2="154" stroke="#1a1a18" stroke-width="4.2"/>
  <line x1="720" y1="154" x2="720" y2="167" stroke="#1a1a18" stroke-width="4.2"/>
  </g>

  <g filter="url(#hd)">

  <!-- Stage 1 — entry state, dim, small -->
  <circle cx="80" cy="370" r="9" fill="#e5e2db" stroke="#6b6b68" stroke-width="2.7"/>

  <!-- Stage 2 — gaining traction (seated on curve: y≈238 at x=240) -->
  <circle cx="240" cy="238" r="12" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>

  <!-- Stage 3 — midpoint, copper (curve y≈153 at x=400) -->
  <circle cx="400" cy="153" r="16" fill="#C8956C"/>

  <!-- Stage 4 — approaching fluency (curve y≈113 at x=560) -->
  <circle cx="560" cy="113" r="20" fill="#6b6b68"/>

  <!-- Stage 5 — full productivity, anchor node -->
  <circle cx="720" cy="120" r="25.96" fill="#1a1a18"/>
  </g>
</svg>
