<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="10" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#7ab0a5"/>

  <!-- 7 converging stream paths — crisp and unfiltered. Each is anchored at the exact
       nominal center of its origin circle and of the unified endpoint circle, so it stays
       covered by those nodes' fills even after they drift a few px under the filter. -->
  <g>
  <!-- M startX,startY C 280,startY 520,250 770,250 -->
  <!-- Opacity increases as streams converge — fragmented to unified -->
  <path d="M 30,55  C 280,55  520,250 770,250" fill="none" stroke="#1a1a18" stroke-width="4.6" opacity="0.38"/>
  <path d="M 30,120 C 280,120 520,250 770,250" fill="none" stroke="#1a1a18" stroke-width="4.6" opacity="0.45"/>
  <path d="M 30,178 C 280,178 520,250 770,250" fill="none" stroke="#1a1a18" stroke-width="4.6" opacity="0.52"/>
  <path d="M 30,250 C 280,250 520,250 770,250" fill="none" stroke="#1a1a18" stroke-width="5.3" opacity="0.62"/>
  <path d="M 30,322 C 280,322 520,250 770,250" fill="none" stroke="#1a1a18" stroke-width="4.6" opacity="0.52"/>
  <path d="M 30,380 C 280,380 520,250 770,250" fill="none" stroke="#1a1a18" stroke-width="4.6" opacity="0.45"/>
  <path d="M 30,445 C 280,445 520,250 770,250" fill="none" stroke="#1a1a18" stroke-width="4.6" opacity="0.38"/>
  </g>

  <g filter="url(#hd)">

  <!-- Small origin marks on the left — the fragmented sources -->
  <circle cx="30" cy="55"  r="5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="30" cy="120" r="5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="30" cy="178" r="5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="30" cy="250" r="6" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="30" cy="322" r="5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="30" cy="380" r="5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="30" cy="445" r="5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>

  <!-- Unified endpoint — one source of truth -->
  <circle cx="770" cy="250" r="18.88" fill="#1a1a18"/>
  <circle cx="770" cy="250" r="9.44"  fill="#C8956C"/>
  </g>
</svg>
