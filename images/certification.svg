<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#4f8a83"/>

  <!-- Baseline — crisp and unfiltered; nudged up 3px so it overlaps the tier rects' nominal
       bottom edge slightly, giving margin against their filtered vertical drift -->
  <g>
  <line x1="72" y1="409" x2="728" y2="409" stroke="#1a1a18" stroke-width="4"/>
  </g>

  <g filter="url(#hd)">

  <!-- Three ascending credential tiers, bottom-aligned -->
  <!-- Bottom edge: y=410, resting on the baseline -->

  <!-- Tier 1 — Foundation: widest, shortest, lightest -->
  <rect x="72" y="278" width="200" height="132" rx="4" fill="#ede8df" stroke="#1a1a18" stroke-width="3.24"/>
  <!-- Badge mark -->
  <circle cx="172" cy="344" r="14" fill="#4f8a83" stroke="#6b6b68" stroke-width="2.7"/>
  <circle cx="172" cy="344" r="7"  fill="#e5e2db"/>

  <!-- Tier 2 — Practitioner: medium -->
  <rect x="300" y="175" width="200" height="235" rx="4" fill="#ddd9d1" stroke="#1a1a18" stroke-width="3.24"/>
  <!-- Badge mark -->
  <circle cx="400" cy="292.5" r="16" fill="#4f8a83" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="400" cy="292.5" r="9.44"  fill="#C8956C" opacity="0.65"/>

  <!-- Tier 3 — Expert: narrowest, tallest, accent -->
  <rect x="528" y="70" width="200" height="340" rx="4" fill="#C8956C" stroke="#1a1a18" stroke-width="3.24"/>
  <!-- Badge mark — white on dark -->
  <circle cx="628" cy="240" r="18" fill="#4f8a83" opacity="0.25"/>
  <circle cx="628" cy="240" r="10" fill="#4f8a83" opacity="0.6"/>
  </g>
</svg>
