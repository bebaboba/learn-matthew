<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#6fa896"/>

  <!-- Connector lines — crisp and unfiltered; endpoints overshoot ~7px into each node's
       footprint so they still read as connected once the filtered node drifts under displacement -->
  <g>
  <!-- Lines from sources to warehouse -->
  <line x1="79.9" y1="106.5" x2="334.1" y2="251.5" stroke="#1a1a18" stroke-width="4.6"/>
  <line x1="79.2" y1="188.3" x2="334.8" y2="251.7" stroke="#1a1a18" stroke-width="4.6"/>
  <line x1="79"   y1="250"   x2="335"   y2="250"   stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="79.2" y1="311.6" x2="334.8" y2="250.4" stroke="#1a1a18" stroke-width="4.6"/>
  <line x1="79.9" y1="393.4" x2="334.1" y2="250.6" stroke="#1a1a18" stroke-width="4.6"/>

  <!-- Lines from warehouse to outputs -->
  <line x1="359.6" y1="237.8" x2="554.4" y2="152.2" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="359"   y1="250"   x2="555"   y2="250"   stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="359.6" y1="262.2" x2="554.4" y2="347.8" stroke="#1a1a18" stroke-width="5.6"/>

  <!-- Secondary connections from outputs — downstream consumers -->
  <line x1="577.3" y1="149.9" x2="711.7" y2="112.1" stroke="#1a1a18" stroke-width="4"/>
  <line x1="577.1" y1="160.6" x2="711.9" y2="187.4" stroke="#1a1a18" stroke-width="4"/>
  <line x1="577"   y1="250"   x2="712"   y2="250"   stroke="#1a1a18" stroke-width="4"/>
  <line x1="577.2" y1="339.6" x2="711.8" y2="307.4" stroke="#1a1a18" stroke-width="4"/>
  <line x1="577.2" y1="350.4" x2="711.8" y2="382.6" stroke="#1a1a18" stroke-width="4"/>
  </g>

  <g filter="url(#hd)">

  <!-- Input sources — left side, learning data streams -->
  <circle cx="80" cy="110" r="6" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="80" cy="190" r="6" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="80" cy="250" r="6" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="80" cy="310" r="6" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="80" cy="390" r="6" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>

  <!-- Central warehouse node — Snowflake, larger, dark -->
  <circle cx="340" cy="250" r="30.68" fill="#1a1a18"/>
  <circle cx="340" cy="250" r="14" fill="#6fa896"/>
  <circle cx="340" cy="250" r="7.08"  fill="#1a1a18"/>

  <!-- Row-level security band — subtle horizontal stripes across warehouse -->
  <line x1="316" y1="238" x2="364" y2="238" stroke="#6fa896" stroke-width="2.7" opacity="0.4"/>
  <line x1="316" y1="250" x2="364" y2="250" stroke="#6fa896" stroke-width="2.7" opacity="0.4"/>
  <line x1="316" y1="262" x2="364" y2="262" stroke="#6fa896" stroke-width="2.7" opacity="0.4"/>

  <!-- Output 1 — Tableau dashboards: grid of small squares -->
  <circle cx="562" cy="155" r="22" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <rect x="555" y="148" width="6" height="6" fill="#C8956C" opacity="0.6"/>
  <rect x="563" y="148" width="6" height="6" fill="#C8956C" opacity="0.9"/>
  <rect x="555" y="156" width="6" height="6" fill="#C8956C" opacity="0.4"/>
  <rect x="563" y="156" width="6" height="6" fill="#C8956C" opacity="0.7"/>

  <!-- Output 2 — Direct / pipeline: clean circle -->
  <circle cx="562" cy="250" r="22" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <line x1="548" y1="250" x2="576" y2="250" stroke="#C8956C" stroke-width="3.6"/>
  <line x1="562" y1="236" x2="562" y2="264" stroke="#C8956C" stroke-width="3.6"/>

  <!-- Output 3 — LLM access: arc suggesting language/model -->
  <circle cx="562" cy="345" r="22" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <path d="M 549,339 Q 562,330 575,339" fill="none" stroke="#C8956C" stroke-width="3.24"/>
  <path d="M 549,349 Q 562,358 575,349" fill="none" stroke="#C8956C" stroke-width="3.24"/>

  <circle cx="708" cy="115" r="4.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="708" cy="185" r="4.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="708" cy="250" r="4.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="708" cy="310" r="4.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  <circle cx="708" cy="380" r="4.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.16"/>
  </g>
</svg>
