<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#7ab0a5"/>

  <!-- Connector lines — crisp and unfiltered; endpoints overshoot ~7px into each node's
       footprint so they still read as connected once the filtered node drifts under displacement -->
  <g>
  <!-- Entry to foundation -->
  <line x1="70.1" y1="253.8" x2="198.9" y2="171.2" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="70.1" y1="246.2" x2="198.9" y2="328.8" stroke="#1a1a18" stroke-width="5.6"/>

  <!-- Foundation to skills -->
  <line x1="210.4" y1="177.2" x2="406.7" y2="112.8" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="210.1" y1="173.7" x2="406.9" y2="211.3" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="210.1" y1="326.3" x2="406.9" y2="288.7" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="210.4" y1="322.8" x2="406.7" y2="387.2" stroke="#1a1a18" stroke-width="5.6"/>

  <!-- Skills to applications -->
  <line x1="413.2" y1="116.4" x2="636.9" y2="69.6"  stroke="#1a1a18" stroke-width="4"/>
  <line x1="413.1" y1="113.9" x2="636.9" y2="150.1" stroke="#1a1a18" stroke-width="4"/>
  <line x1="413.0" y1="210.4" x2="637.0" y2="197.6" stroke="#1a1a18" stroke-width="4"/>
  <line x1="413.2" y1="208.5" x2="636.8" y2="257.5" stroke="#1a1a18" stroke-width="4"/>
  <line x1="413.0" y1="289.7" x2="637.0" y2="300.3" stroke="#1a1a18" stroke-width="4"/>
  <line x1="413.3" y1="288.0" x2="636.7" y2="355.0" stroke="#1a1a18" stroke-width="4"/>
  <line x1="413.0" y1="384.5" x2="637.0" y2="400.5" stroke="#1a1a18" stroke-width="4"/>
  <line x1="413.2" y1="383.3" x2="636.8" y2="440.7" stroke="#1a1a18" stroke-width="4"/>
  </g>

  <g filter="url(#hd)">

  <!-- Entry point -->
  <circle cx="70" cy="250" r="7" fill="#6b6b68"/>

  <!-- Foundation nodes — two pillars, the curriculum bedrock -->
  <circle cx="203" cy="175" r="16.52" fill="#1a1a18"/>
  <circle cx="203" cy="325" r="16.52" fill="#1a1a18"/>

  <!-- Skill nodes — applied practice, copper -->
  <circle cx="410" cy="115" r="11.8" fill="#C8956C"/>
  <circle cx="410" cy="210" r="11.8" fill="#C8956C"/>
  <circle cx="410" cy="290" r="11.8" fill="#C8956C"/>
  <circle cx="410" cy="385" r="11.8" fill="#C8956C"/>

  <!-- Application nodes — outcomes, light outlined circles -->
  <circle cx="634" cy="72" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="634" cy="148" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="634" cy="198" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="634" cy="255" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="634" cy="300" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="634" cy="352" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="634" cy="400" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="634" cy="438" r="6" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  </g>
</svg>
