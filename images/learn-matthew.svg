<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f6f2"/>

  <!-- Single entry — the visitor -->
  <circle cx="90" cy="250" r="10" fill="#1a1a18"/>

  <!-- Entry to branch point -->
  <line x1="100" y1="250" x2="248" y2="250" stroke="#e5e2db" stroke-width="1.5"/>

  <!-- Branch point — the persona decision -->
  <circle cx="255" cy="250" r="7" fill="#6b6b68"/>

  <!-- Three persona paths branching from decision point -->
  <line x1="262" y1="250" x2="438" y2="120" stroke="#e5e2db" stroke-width="1.5"/>
  <line x1="262" y1="250" x2="445" y2="250" stroke="#e5e2db" stroke-width="1.5"/>
  <line x1="262" y1="250" x2="438" y2="380" stroke="#e5e2db" stroke-width="1.5"/>

  <!-- Persona nodes — three paths -->
  <circle cx="448" cy="120" r="9" fill="#C8956C"/>
  <circle cx="455" cy="250" r="9" fill="#6b6b68"/>
  <circle cx="448" cy="380" r="9" fill="#1a1a18"/>

  <!-- Content clusters — 3 nodes per persona, personalized content -->
  <!-- Path 1 (top) — copper -->
  <line x1="457" y1="120" x2="629" y2="78"  stroke="#e5e2db" stroke-width="1"/>
  <line x1="457" y1="120" x2="629" y2="118" stroke="#e5e2db" stroke-width="1"/>
  <line x1="457" y1="120" x2="629" y2="158" stroke="#e5e2db" stroke-width="1"/>
  <circle cx="637" cy="78"  r="5.5" fill="#f5ead8" stroke="#C8956C" stroke-width="1.5"/>
  <circle cx="637" cy="118" r="5.5" fill="#f5ead8" stroke="#C8956C" stroke-width="1.5"/>
  <circle cx="637" cy="158" r="5.5" fill="#f5ead8" stroke="#C8956C" stroke-width="1.5"/>

  <!-- Path 2 (middle) — muted -->
  <line x1="464" y1="250" x2="629" y2="222" stroke="#e5e2db" stroke-width="1"/>
  <line x1="464" y1="250" x2="629" y2="250" stroke="#e5e2db" stroke-width="1"/>
  <line x1="464" y1="250" x2="629" y2="278" stroke="#e5e2db" stroke-width="1"/>
  <circle cx="637" cy="222" r="5.5" fill="#f5ead8" stroke="#6b6b68" stroke-width="1.5"/>
  <circle cx="637" cy="250" r="5.5" fill="#f5ead8" stroke="#6b6b68" stroke-width="1.5"/>
  <circle cx="637" cy="278" r="5.5" fill="#f5ead8" stroke="#6b6b68" stroke-width="1.5"/>

  <!-- Path 3 (bottom) — dark -->
  <line x1="457" y1="380" x2="629" y2="342" stroke="#e5e2db" stroke-width="1"/>
  <line x1="457" y1="380" x2="629" y2="382" stroke="#e5e2db" stroke-width="1"/>
  <line x1="457" y1="380" x2="629" y2="422" stroke="#e5e2db" stroke-width="1"/>
  <circle cx="637" cy="342" r="5.5" fill="#f5ead8" stroke="#1a1a18" stroke-width="1.5"/>
  <circle cx="637" cy="382" r="5.5" fill="#f5ead8" stroke="#1a1a18" stroke-width="1.5"/>
  <circle cx="637" cy="422" r="5.5" fill="#f5ead8" stroke="#1a1a18" stroke-width="1.5"/>
</svg>
