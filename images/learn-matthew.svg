<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="hd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#6fa896"/>

  <!-- Connector lines — crisp and unfiltered; endpoints overshoot ~7px into each node's
       footprint so they still read as connected once the filtered node drifts under displacement -->
  <g>
  <!-- Entry to branch point -->
  <line x1="93" y1="250" x2="255" y2="250" stroke="#1a1a18" stroke-width="5.6"/>

  <!-- Three persona paths branching from decision point -->
  <line x1="256" y1="254" x2="444" y2="116" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="255" y1="250" x2="456" y2="250" stroke="#1a1a18" stroke-width="5.6"/>
  <line x1="256" y1="246" x2="444" y2="384" stroke="#1a1a18" stroke-width="5.6"/>

  <!-- Content cluster lines — path 1 (top) -->
  <line x1="450" y1="122" x2="639" y2="75"  stroke="#1a1a18" stroke-width="4"/>
  <line x1="450" y1="120" x2="639" y2="118" stroke="#1a1a18" stroke-width="4"/>
  <line x1="450" y1="118" x2="639" y2="161" stroke="#1a1a18" stroke-width="4"/>

  <!-- Content cluster lines — path 2 (middle) -->
  <line x1="457" y1="251" x2="639" y2="220" stroke="#1a1a18" stroke-width="4"/>
  <line x1="457" y1="250" x2="639" y2="250" stroke="#1a1a18" stroke-width="4"/>
  <line x1="457" y1="249" x2="639" y2="280" stroke="#1a1a18" stroke-width="4"/>

  <!-- Content cluster lines — path 3 (bottom) -->
  <line x1="450" y1="381" x2="639" y2="342" stroke="#1a1a18" stroke-width="4"/>
  <line x1="450" y1="380" x2="639" y2="382" stroke="#1a1a18" stroke-width="4"/>
  <line x1="450" y1="378" x2="639" y2="423" stroke="#1a1a18" stroke-width="4"/>
  </g>

  <g filter="url(#hd)">

  <!-- Single entry — the visitor -->
  <circle cx="90" cy="250" r="11.8" fill="#1a1a18"/>

  <!-- Branch point — the persona decision -->
  <circle cx="255" cy="250" r="9" fill="#6b6b68"/>

  <!-- Persona nodes — three paths -->
  <circle cx="448" cy="120" r="10.62" fill="#C8956C"/>
  <circle cx="455" cy="250" r="9" fill="#6b6b68"/>
  <circle cx="448" cy="380" r="10.62" fill="#1a1a18"/>

  <!-- Content nodes — 3 per persona, personalized content -->
  <circle cx="637" cy="78"  r="5.5" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="637" cy="118" r="5.5" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="637" cy="158" r="5.5" fill="#ffffff" stroke="#C8956C" stroke-width="2.7"/>
  <circle cx="637" cy="222" r="5.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.7"/>
  <circle cx="637" cy="250" r="5.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.7"/>
  <circle cx="637" cy="278" r="5.5" fill="#ffffff" stroke="#6b6b68" stroke-width="2.7"/>
  <circle cx="637" cy="342" r="5.5" fill="#ffffff" stroke="#1a1a18" stroke-width="2.7"/>
  <circle cx="637" cy="382" r="5.5" fill="#ffffff" stroke="#1a1a18" stroke-width="2.7"/>
  <circle cx="637" cy="422" r="5.5" fill="#ffffff" stroke="#1a1a18" stroke-width="2.7"/>
  </g>
</svg>
