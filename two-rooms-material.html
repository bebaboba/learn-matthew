<body>
  <div class="stage">
    <div class="room seed">
      <div class="label">planting a seed</div>
      <div class="concept"></div>
    </div>
    <div class="room sparkplug">
      <div class="label">replacing a spark plug</div>
      <div class="concept"></div>
    </div>
  </div>
  <div class="controls">
    <label>learning state</label>
    <input type="range" id="slider" min="0" max="1" step="0.001" value="0" />
    <span class="value" id="value">0.00</span>
  </div>
<script>
  const rooms = document.querySelectorAll('.room');
  const slider = document.getElementById('slider');
  const valueEl = document.getElementById('value');
  function setState(v) {
    rooms.forEach(r => r.style.setProperty('--state', v));
    valueEl.textContent = v.toFixed(2);
  }
  setState(0);
  slider.addEventListener('input',  e => setState(parseFloat(e.target.value)));
  slider.addEventListener('change', e => setState(parseFloat(e.target.value)));
  document.addEventListener('touchmove', (e) => {
    const t = e.target;
    const inside = t && t.closest && t.closest('.controls');
    const isSlider = t && t.id === 'slider';
    if (!isSlider && !inside) e.preventDefault();
  }, { passive: false });
</script>
